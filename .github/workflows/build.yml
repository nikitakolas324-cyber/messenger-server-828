name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install kivy python-for-android
    - name: Build APK
      run: |
        p4a create --name MyTelegram --package org.example.mytelegram --version 0.1 --sdk 30 --ndk 25b --requirements python3,kivy --arch arm64-v8a --output dist
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mytelegram-apk
        path: dist/*.apk
